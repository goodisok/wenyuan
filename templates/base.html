<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="问元 — 自研八字排盘与 AI 解读，子平综参、断事、过三关多维验证">
  <title>{% block title %}问元{% endblock %} · 八字排盘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/theme.css?v={{ app_version }}">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#c9a227">
  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <a href="#main-content" class="skip-link">跳到主要内容</a>
  <header class="site-header">
    <div class="site-header-inner">
      <h1><a href="/" class="site-logo">问元</a></h1>
      <nav class="site-nav" aria-label="站点导航">
        <a href="/" class="site-nav-link{% if request.url.path == '/' %} is-active{% endif %}"{% if request.url.path == '/' %} aria-current="page"{% endif %}>排盘</a>
        <a href="/privacy" class="site-nav-link{% if request.url.path == '/privacy' %} is-active{% endif %}"{% if request.url.path == '/privacy' %} aria-current="page"{% endif %}>隐私</a>
      </nav>
    </div>
    {% block header_extra %}{% endblock %}
  </header>
  <main id="main-content" class="container {% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <p class="footer-brand">问元 Wenyuan · 自研子平综参</p>
    <p class="footer-note">仅供参考，不构成人生决策依据 · <a href="/privacy">隐私说明</a> · <a href="https://github.com/goodisok/wenyuan" rel="noopener noreferrer" target="_blank">GitHub</a>（MIT）</p>
  </footer>
  {% block scripts %}{% endblock %}
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/static/sw.js?v={{ app_version }}").catch(() => {});
    }
  </script>
</body>
</html>
