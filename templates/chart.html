{% extends "base.html" %}
{% block title %}命盘{% endblock %}
{% block body_class %}page-chart{% endblock %}
{% block header_extra %}
<div class="site-header-sub">
  <p class="site-tagline site-tagline-compact">命盘 · 子平综参 · 子平直断</p>
</div>
{% endblock %}
{% block main_class %}container-chart{% endblock %}
{% block content %}
<div id="chart-loading" class="chart-skeleton" aria-live="polite" aria-busy="true">
  <div class="skeleton-pulse"></div>
  <p class="skeleton-text">正在排盘…</p>
  <div class="skeleton-grid">
    <div class="skeleton-block"></div>
    <div class="skeleton-block"></div>
    <div class="skeleton-block wide"></div>
  </div>
</div>
<div id="chart-root"></div>
{% endblock %}
{% block scripts %}
<script src="/static/js/app.js?v={{ app_version }}"></script>
<script>
(function () {
  Wenyuan.initChartPage();
})();
</script>
{% endblock %}
