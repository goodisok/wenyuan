{% extends "base.html" %}
{% block title %}命盘{% endblock %}
{% block content %}
<div id="chart-root"></div>
<div class="actions">
  <a href="/" class="btn btn-secondary">重新排盘</a>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/app.js"></script>
<script>
(function () {
  const root = document.getElementById("chart-root");
  const raw = sessionStorage.getItem(Wenyuan.STORAGE_KEY);

  if (!raw) {
    root.innerHTML = '<div class="alert alert-error">暂无命盘数据，请先<a href="/">排盘</a></div>';
    return;
  }

  let chart;
  try {
    chart = JSON.parse(raw);
  } catch {
    root.innerHTML = '<div class="alert alert-error">数据损坏，请重新排盘</div>';
    return;
  }

  root.innerHTML = Wenyuan.renderChart(chart);

  const btnClassic = document.getElementById("btn-analyze-classic");
  const btnModern = document.getElementById("btn-analyze-modern");
  const styleButtons = document.querySelectorAll(".ai-style-btn");

  async function runAnalyze(style) {
    const loading = document.getElementById("ai-loading");
    const err = document.getElementById("ai-error");
    Wenyuan.hideError(err);
    loading.classList.remove("hidden");
    document.getElementById("ai-empty")?.classList.add("hidden");
    styleButtons.forEach((btn) => { btn.disabled = true; });

    try {
      const res = await Wenyuan.API.analyze(chart, style);
      if (!res.success) {
        Wenyuan.showError(err, res.error || "分析失败");
        const hasResult = !document.getElementById("ai-result-wrap")?.classList.contains("hidden");
        if (!hasResult) document.getElementById("ai-empty")?.classList.remove("hidden");
      } else {
        Wenyuan.renderAnalysis(res.analysis, style);
      }
    } catch (e) {
      Wenyuan.showError(err, e.message || "请求失败");
    } finally {
      loading.classList.add("hidden");
      styleButtons.forEach((btn) => { btn.disabled = false; });
    }
  }

  btnClassic?.addEventListener("click", () => runAnalyze("classic"));
  btnModern?.addEventListener("click", () => runAnalyze("modern"));
})();
</script>
{% endblock %}
